name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Clone Pico SDK
        run: |
          git clone https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
          cd $HOME/pico-sdk && git submodule update --init lib/tinyusb

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -G Ninja -DPICO_SDK_PATH=$HOME/pico-sdk
          ninja

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: usb_mouse
          path: build/usb_mouse.uf2
